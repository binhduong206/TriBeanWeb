<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <link rel="stylesheet" href="../../css/base/reset.css" />
        <link rel="stylesheet" href="../../css/base/global.css" />
        <link rel="stylesheet" href="../../css/base/variables.css" />
        <link rel="stylesheet" href="../../css/components/card.css" />
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
        />
    </head>
    <body>
        <div class="card">
            <div class="card__container">
                <div class="card__img">
                    <a href="../../pages/productdetail.html">
                        <img
                            src="../../assets/banner_img/bac_xiu_foam_dua.png"
                            alt=""
                        />
                    </a>
                </div>

                <div class="card__content">
                    <div class="card__header">
                        <div class="card__category">
                            <span>Coffee</span>
                        </div>
                        <div class="card__rating">
                            <span>4.9</span>
                            <i class="fa-solid fa-star"></i>
                        </div>
                    </div>

                    <div class="card__name">Coconut Coffee</div>
                    <div class="card__desc">Nhon nhon</div>

                    <div class="card__footer">
                        <div class="card__footer--left">
                            <div class="card__price">$2.9</div>
                            <div class="card__price--new"></div>
                        </div>

                        <div class="card__favorite">
                            <i class="fa-regular fa-heart"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
