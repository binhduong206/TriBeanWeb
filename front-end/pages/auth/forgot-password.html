<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Forgot Password — TriBean</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <link rel="stylesheet" href="../../css/pages/auth/resetpassword.css" />
    </head>
    <body>
        <div class="auth-bg">
            <div class="auth-card">
                <!-- Logo -->
                <a href="../../index.html" class="auth-logo">
                    <span class="auth-logo__icon">☕</span>
                    <span class="auth-logo__text">TriBean</span>
                </a>

                <!-- Header -->
                <div class="auth-header">
                    <div class="auth-header__icon">
                        <i class="fa-solid fa-lock"></i>
                    </div>
                    <h1 class="auth-header__title">Forgot Password?</h1>
                    <p class="auth-header__sub">
                        No worries! Enter your email and we'll send you a reset
                        link.
                    </p>
                </div>

                <!-- Form -->
                <div class="auth-form" id="forgot-form">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <div class="form-input-wrap">
                            <i
                                class="fa-regular fa-envelope form-input-icon"
                            ></i>
                            <input
                                type="email"
                                class="form-input"
                                id="email"
                                placeholder="you@example.com"
                                autocomplete="email"
                            />
                        </div>
                        <span class="form-error" id="error-email"></span>
                    </div>

                    <button class="auth-btn" id="submit-btn">
                        Send Reset Link
                    </button>

                    <div class="auth-msg" id="auth-msg"></div>
                </div>

                <!-- Success state -->
                <div class="auth-success" id="success-state" hidden>
                    <div class="auth-success__icon">
                        <i class="fa-solid fa-paper-plane"></i>
                    </div>
                    <h2 class="auth-success__title">Check your email!</h2>
                    <p class="auth-success__sub">
                        If an account exists for
                        <strong id="sent-email"></strong>, you'll receive a
                        password reset link shortly.
                    </p>
                    <p class="auth-success__note">
                        Didn't receive it? Check your spam folder or
                        <button class="auth-link-btn" id="resend-btn">
                            try again</button
                        >.
                    </p>
                </div>

                <!-- Back to login -->
                <div class="auth-footer">
                    <a href="./login.html" class="auth-back-link">
                        <i class="fa-solid fa-arrow-left"></i> Back to Sign In
                    </a>
                </div>
            </div>
        </div>

        <script src="../../js/pages/auth/forgot-password.js"></script>
    </body>
</html>
