<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Reset Password — TriBean</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <link rel="stylesheet" href="../../css/pages/auth/resetpassword.css" />
    </head>
    <body>
        <div class="auth-bg">
            <div class="auth-card">
                <!-- Logo -->
                <a href="../../index.html" class="auth-logo">
                    <span class="auth-logo__icon">☕</span>
                    <span class="auth-logo__text">TriBean</span>
                </a>

                <!-- Invalid token state -->
                <div class="auth-invalid" id="invalid-state" hidden>
                    <div class="auth-invalid__icon">
                        <i class="fa-solid fa-circle-xmark"></i>
                    </div>
                    <h2 class="auth-invalid__title">Link Expired</h2>
                    <p class="auth-invalid__sub">
                        This reset link is invalid or has expired. Please
                        request a new one.
                    </p>
                    <a
                        href="./forgot-password.html"
                        class="auth-btn"
                        style="display: inline-flex; margin-top: 8px"
                    >
                        Request New Link
                    </a>
                </div>

                <!-- Reset form -->
                <div id="reset-content">
                    <div class="auth-header">
                        <div class="auth-header__icon auth-header__icon--green">
                            <i class="fa-solid fa-key"></i>
                        </div>
                        <h1 class="auth-header__title">Set New Password</h1>
                        <p class="auth-header__sub">
                            Your new password must be at least 6 characters.
                        </p>
                    </div>

                    <div class="auth-form">
                        <!-- New password -->
                        <div class="form-group">
                            <label class="form-label">New Password</label>
                            <div class="form-input-wrap">
                                <i class="fa-solid fa-lock form-input-icon"></i>
                                <input
                                    type="password"
                                    class="form-input"
                                    id="new-password"
                                    placeholder="At least 8 characters"
                                    autocomplete="new-password"
                                />
                                <button
                                    class="form-pw-toggle"
                                    id="toggle-new"
                                    type="button"
                                    tabindex="-1"
                                >
                                    <i class="fa-regular fa-eye"></i>
                                </button>
                            </div>
                            <!-- Password strength -->
                            <div class="pw-strength" id="pw-strength" hidden>
                                <div class="pw-strength__bar">
                                    <div
                                        class="pw-strength__fill"
                                        id="pw-fill"
                                    ></div>
                                </div>
                                <span
                                    class="pw-strength__label"
                                    id="pw-label"
                                ></span>
                            </div>
                            <span class="form-error" id="error-password"></span>
                        </div>

                        <!-- Confirm password -->
                        <div class="form-group">
                            <label class="form-label">Confirm Password</label>
                            <div class="form-input-wrap">
                                <i class="fa-solid fa-lock form-input-icon"></i>
                                <input
                                    type="password"
                                    class="form-input"
                                    id="confirm-password"
                                    placeholder="Re-enter your password"
                                    autocomplete="new-password"
                                />
                                <button
                                    class="form-pw-toggle"
                                    id="toggle-confirm"
                                    type="button"
                                    tabindex="-1"
                                >
                                    <i class="fa-regular fa-eye"></i>
                                </button>
                            </div>
                            <span class="form-error" id="error-confirm"></span>
                        </div>

                        <button class="auth-btn" id="submit-btn">
                            Reset Password
                        </button>

                        <div class="auth-msg" id="auth-msg"></div>
                    </div>
                </div>

                <!-- Back to login -->
                <div class="auth-footer">
                    <a href="./login.html" class="auth-back-link">
                        <i class="fa-solid fa-arrow-left"></i> Back to Sign In
                    </a>
                </div>
            </div>
        </div>

        <script src="../../js/pages/auth/reset-password.js"></script>
    </body>
</html>
